<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DropSFX — Redefinir Senha</title>
  <style>
    @font-face{font-family:'Degular';font-weight:400;src:local('Degular'),local('Degular-Regular');}
    @font-face{font-family:'Degular';font-weight:600;src:local('Degular Semibold'),local('Degular-Semibold');}
    @font-face{font-family:'Degular';font-weight:700;src:local('Degular Bold'),local('Degular-Bold');}

    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --purple:#7c3aed;--purple-hi:#a855f7;
      --purple-glow:rgba(124,58,237,0.4);
      --purple-dim:rgba(124,58,237,0.18);
      --purple-mid:rgba(124,58,237,0.35);
    }
    body{
      min-height:100vh;
      background:linear-gradient(160deg,#0a0812 0%,#050508 100%);
      display:flex;align-items:center;justify-content:center;
      font-family:'Degular','Inter',-apple-system,sans-serif;
      -webkit-font-smoothing:antialiased;
      padding:24px;
    }

    .card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;
      padding:40px 36px;
      max-width:380px;width:100%;
      box-shadow:0 32px 80px rgba(0,0,0,0.6);
      animation:fadeUp 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    .logo{height:30px;width:auto;display:block;margin:0 auto 20px;}

    h1{font-size:18px;font-weight:700;color:#fff;text-align:center;margin-bottom:6px;}
    .sub{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:24px;line-height:1.5;}

    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .field label{font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;}
    .field-pw{position:relative;}
    .field input{
      width:100%;height:38px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;
      color:#fff;font-family:'Degular','Inter',sans-serif;font-size:13px;
      padding:0 40px 0 12px;outline:none;
      transition:all 0.15s;
    }
    .field input:focus{border-color:var(--purple-mid);background:rgba(255,255,255,0.09);box-shadow:0 0 0 2px var(--purple-dim);}
    .field input::placeholder{color:rgba(255,255,255,0.2);}

    .pw-toggle{
      position:absolute;right:10px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:rgba(255,255,255,0.3);
      cursor:pointer;display:flex;align-items:center;
      transition:color 0.15s;
    }
    .pw-toggle:hover{color:rgba(255,255,255,0.6);}

    /* Password strength bar */
    .strength-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:6px;overflow:hidden;}
    .strength-fill{height:100%;width:0;border-radius:3px;transition:width 0.3s,background 0.3s;}
    .strength-label{font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;}

    .btn{
      width:100%;height:40px;margin-top:6px;
      background:var(--purple);border:none;border-radius:10px;
      color:white;font-family:'Degular','Inter',sans-serif;
      font-size:13px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 2px 12px var(--purple-glow);
      transition:all 0.15s;
    }
    .btn:hover{background:var(--purple-hi);}
    .btn:active{transform:scale(0.98);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    .spinner{
      width:14px;height:14px;border-radius:50%;
      border:2px solid rgba(255,255,255,0.3);
      border-top-color:white;
      animation:spin 0.7s linear infinite;
      display:none;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    .msg{
      padding:10px 14px;border-radius:8px;
      font-size:11.5px;text-align:center;
      margin-bottom:14px;display:none;
    }
    .msg.error{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
    .msg.success{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.25);}
    .msg.visible{display:block;}

    /* Success state */
    .success-view{display:none;text-align:center;}
    .success-view.visible{display:block;}
    .success-icon{
      width:64px;height:64px;border-radius:50%;
      background:rgba(34,197,94,0.12);
      border:2px solid rgba(34,197,94,0.3);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 16px;
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(34,197,94,0.2);}50%{box-shadow:0 0 35px rgba(34,197,94,0.4);}}
    .success-view h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px;}
    .success-view p{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:20px;}
    .close-hint{font-size:11px;color:rgba(255,255,255,0.2);margin-top:12px;}
  </style>
</head>
<body>
<div class="card">
  <img class="logo" src="assets/logo.webp" alt="DropSFX"
       onerror="this.style.display='none'"/>

  <!-- Form view -->
  <div id="form-view">
    <h1>Redefinir senha</h1>
    <p class="sub">Digite sua nova senha para acessar o DropSFX</p>

    <div class="msg error" id="msg-error"></div>

    <div class="field">
      <label>Nova senha</label>
      <div class="field-pw">
        <input type="password" id="pw1" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
        <button class="pw-toggle" onclick="togglePw('pw1',this)" tabindex="-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="field">
      <label>Confirmar senha</label>
      <div class="field-pw">
        <input type="password" id="pw2" placeholder="Repita a senha" autocomplete="new-password"/>
        <button class="pw-toggle" onclick="togglePw('pw2',this)" tabindex="-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" id="submit-btn" onclick="handleSubmit()">
      <span id="btn-text">Salvar nova senha</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <!-- Success view -->
  <div class="success-view" id="success-view">
    <div class="success-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Senha alterada! ✓</h2>
    <p>Sua senha foi atualizada com sucesso.<br/>Volte ao plugin DropSFX e faça login.</p>
    <p class="close-hint">Pode fechar esta aba.</p>
  </div>
</div>

<script>
  const SUPA_URL = 'https://bwgrxdjdvrdawarbnqjv.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3Z3J4ZGpkdnJkYXdhcmJucWp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjIxNDgsImV4cCI6MjA5NDU5ODE0OH0.M1Yw6ljgUzPQWTW0CC8DBn8WV6nZDKCCKTwzcZN_Zo0';

  // Supabase can send params in hash OR query string depending on version
  // Old:  #access_token=...&type=recovery
  // New:  ?token_hash=...&type=recovery  or  ?code=...
  const hashParams  = new URLSearchParams(window.location.hash.slice(1));
  const queryParams = new URLSearchParams(window.location.search.slice(1));

  const type       = hashParams.get('type')       || queryParams.get('type');
  const tokenHash  = queryParams.get('token_hash') || queryParams.get('code');
  const accessToken = hashParams.get('access_token');

  let resolvedToken = accessToken || null;

  async function init() {
    // New PKCE flow: exchange token_hash for access_token
    if (!resolvedToken && tokenHash && type === 'recovery') {
      try {
        const res = await fetch(`${SUPA_URL}/auth/v1/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY },
          body: JSON.stringify({ token_hash: tokenHash, type: 'recovery' })
        });
        const data = await res.json();
        if (data.access_token) {
          resolvedToken = data.access_token;
        } else {
          showInitError('Link inválido ou expirado. Solicite um novo link no plugin.');
          return;
        }
      } catch(e) {
        showInitError('Erro ao verificar link. Tente novamente.');
        return;
      }
    }

    if (!resolvedToken || (type && type !== 'recovery')) {
      showInitError('Link inválido ou expirado. Solicite um novo link no plugin.');
    }
  }

  function showInitError(msg) {
    const el = document.getElementById('msg-error');
    el.textContent = msg; el.classList.add('visible');
    document.getElementById('submit-btn').disabled = true;
  }

  init();

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // Password strength
  document.getElementById('pw1').addEventListener('input', function() {
    const val = this.value;
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let strength = 0;
    if (val.length >= 6)  strength++;
    if (val.length >= 10) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
    const labels = ['Muito fraca','Fraca','Média','Forte','Muito forte'];
    const widths = ['20%','40%','60%','80%','100%'];

    if (val.length === 0) { fill.style.width='0'; label.textContent=''; return; }
    const idx = Math.min(strength - 1, 4);
    fill.style.width  = widths[idx];
    fill.style.background = colors[idx];
    label.textContent = labels[idx];
    label.style.color = colors[idx];
  });

  async function handleSubmit() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const err = document.getElementById('msg-error');

    err.classList.remove('visible');

    if (pw1.length < 6) { err.textContent='Senha deve ter pelo menos 6 caracteres'; err.classList.add('visible'); return; }
    if (pw1 !== pw2)    { err.textContent='As senhas não coincidem'; err.classList.add('visible'); return; }

    const btn  = document.getElementById('submit-btn');
    const text = document.getElementById('btn-text');
    const spin = document.getElementById('spinner');

    btn.disabled = true;
    text.style.display = 'none';
    spin.style.display = 'block';

    try {
      const res = await fetch(`${SUPA_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${resolvedToken}`
        },
        body: JSON.stringify({ password: pw1 })
      });

      if (!res.ok) {
        const d = await res.json();
        throw new Error(d.error_description || d.msg || 'Erro ao alterar senha');
      }

      // Show success
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').classList.add('visible');

    } catch(e) {
      err.textContent = e.message;
      err.classList.add('visible');
      btn.disabled = false;
      text.style.display = 'block';
      spin.style.display = 'none';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
